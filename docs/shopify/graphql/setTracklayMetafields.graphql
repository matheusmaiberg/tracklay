# Criar / atualizar TODOS os metafields do Tracklay de uma vez
# Preencha o array $metafields com todos os campos

mutation SetTracklayMetafields($metafields: [MetafieldsSetInput!]!) {
  metafieldsSet(metafields: $metafields) {
    metafields { id namespace key value type }
    userErrors { field message code }
  }
}

