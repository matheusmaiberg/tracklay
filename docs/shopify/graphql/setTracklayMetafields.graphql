# Criar / atualizar TODOS os metafields do Tracklay de uma vez
# Preencha $ownerId com o gid retornado em getShopId

mutation SetTracklayMetafields(
  $ownerId: ID!,
  $gtmId: String!,
  $measurementId: String!,
  $workerUrl: String!,
  $gtmServerUrl: String!,
  $googleUuid: String!,
  $facebookUuid: String!,
  $currency: String!,
  $debug: String!
) {
  metafieldsSet(metafields: [
    { ownerId: $ownerId, namespace: "tracklay", key: "gtm_id", value: $gtmId, type: "single_line_text_field" },
    { ownerId: $ownerId, namespace: "tracklay", key: "measurement_id", value: $measurementId, type: "single_line_text_field" },
    { ownerId: $ownerId, namespace: "tracklay", key: "worker_url", value: $workerUrl, type: "single_line_text_field" },
    { ownerId: $ownerId, namespace: "tracklay", key: "gtm_server_url", value: $gtmServerUrl, type: "single_line_text_field" },
    { ownerId: $ownerId, namespace: "tracklay", key: "google_uuid", value: $googleUuid, type: "single_line_text_field" },
    { ownerId: $ownerId, namespace: "tracklay", key: "facebook_uuid", value: $facebookUuid, type: "single_line_text_field" },
    { ownerId: $ownerId, namespace: "tracklay", key: "currency", value: $currency, type: "single_line_text_field" },
    { ownerId: $ownerId, namespace: "tracklay", key: "debug", value: $debug, type: "boolean" }
  ]) {
    metafields { id namespace key value type }
    userErrors { field message code }
  }
}

